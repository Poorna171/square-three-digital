[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

# TanStack Start (via Nitro) emits Netlify Functions for SSR routes
# and writes static assets to `dist`. The netlify preset generates
# the required redirects automatically — no manual _redirects needed.
